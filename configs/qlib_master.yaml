model:
  type: master
  params:
    lookback_window: 8
    d_model: 256
    t_nhead: 4
    s_nhead: 2
    t_dropout_rate: 0.5
    s_dropout_rate: 0.5
    beta: 2.0
    n_epochs: 40
    lr: 1.0e-04
    early_stopping_patience: 5
    early_stopping_min_delta: 1.0e-04
    seed: 0
  official_repo: https://github.com/SJTU-DMTai/MASTER

data:
  processed_path: "${STOCK_MANAGER_DATA_DIR}/qlib/us_equities/alpha158.parquet"
  market_source_path: "${STOCK_MANAGER_DATA_DIR}/processed/ohlcv_labeled.parquet"
  label_column: LABEL0

qlib:
  provider_uri: "${STOCK_MANAGER_DATA_DIR}/qlib/us_equities"
  market: sp500_current

splits:
  train_end: "2022-12-31"
  valid_end: "2023-12-31"
  test_end: "2025-12-31"

paths:
  model_dir: "${STOCK_MANAGER_MODEL_DIR}"
  report_dir: "${STOCK_MANAGER_REPORT_DIR}/master"

