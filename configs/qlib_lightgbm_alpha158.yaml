model:
  type: lightgbm_alpha158
  params:
    n_estimators: 200
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

data:
  processed_path: "${STOCK_MANAGER_DATA_DIR}/qlib/us_equities/alpha158.parquet"
  label_column: LABEL0

qlib:
  provider_uri: "${STOCK_MANAGER_DATA_DIR}/qlib/us_equities"
  market: sp500_current
  feature_set: Alpha158

splits:
  train_end: "2022-12-31"
  valid_end: "2023-12-31"
  test_end: "2025-12-31"

paths:
  model_dir: "${STOCK_MANAGER_MODEL_DIR}"
  report_dir: "${STOCK_MANAGER_REPORT_DIR}/lightgbm_alpha158"

